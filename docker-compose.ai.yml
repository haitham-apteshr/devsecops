# Standalone AI Security Service — start ONCE locally (like SonarQube).
#   docker compose -f docker-compose.ai.yml up -d --build
# Jenkins calls http://localhost:8506 (never rebuilds this during CI).

services:
  ai_api:
    build:
      context: .
      dockerfile: Dockerfile.ai
    image: devsecops-ai-api:latest
    container_name: devsecops_ai_api
    restart: unless-stopped
    ports:
      - "8506:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - RAG_MODE=builtin
      - GROQ_MAX_TOKENS=2500
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
