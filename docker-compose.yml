version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: devsecops_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-devsecops_db}
      MYSQL_USER: ${DB_USER:-devsecops_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-securepassword}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devsecops_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-devsecops_db}
      - DB_USER=${DB_USER:-devsecops_user}
      - DB_PASSWORD=${DB_PASSWORD:-securepassword}
      - JWT_SECRET=${JWT_SECRET:-supersecretjwtkey}
      - ENABLE_VULNERABILITIES=${ENABLE_VULNERABILITIES:-true}
      - PORT=5000
    depends_on:
      - db
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devsecops_frontend
    restart: always
    ports:
      - "80:80"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  db_data:
